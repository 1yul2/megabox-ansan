services:

  # ============================================================
  # MySQL
  # ============================================================
  db:
    image: mysql:8.0
    container_name: megabox-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dkstkswnddkd!1
      MYSQL_DATABASE: megabox
      TZ: Asia/Seoul
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - megabox-net

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: megabox-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - megabox-net

  # ============================================================
  # Backend (FastAPI)
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: megabox-backend
    restart: unless-stopped
    # 개발 환경: uvicorn --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - megabox-net

  # ============================================================
  # Frontend (React + Vite dev server)
  # ============================================================
  frontend:
    image: node:22-alpine
    container_name: megabox-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - megabox-net

  # ============================================================
  # Nginx (Reverse Proxy)
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: megabox-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - megabox-net

# ============================================================
# Volumes
# ============================================================
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  megabox-net:
    driver: bridge
